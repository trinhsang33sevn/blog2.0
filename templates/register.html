<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký — AutoBlogspot</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
  <style>
    body { background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; }
    .auth-card { max-width: 460px; width: 100%; margin: auto; }
    .auth-brand { font-size: 1.5rem; font-weight: 700; color: #4f46e5; }
  </style>
</head>
<body>
  <div class="auth-card px-3">
    <div class="text-center mb-4">
      <div class="auth-brand"><i class="bi bi-robot me-2"></i>AutoBlogspot</div>
      <p class="text-muted mt-1">Tạo tài khoản — dùng thử miễn phí 3 ngày</p>
    </div>
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        {% if error %}
        <div class="alert alert-danger py-2">
          <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
        </div>
        {% endif %}
        <form method="post" action="/register">
          <div class="mb-3">
            <label class="form-label fw-semibold">Họ và tên</label>
            <input type="text" name="full_name" class="form-control" placeholder="Nguyễn Văn A"
              value="{{ full_name or '' }}" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            <input type="email" name="email" class="form-control" placeholder="you@example.com"
              value="{{ email or '' }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Mật khẩu</label>
            <input type="password" name="password" class="form-control" placeholder="Tối thiểu 6 ký tự" required>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Xác nhận mật khẩu</label>
            <input type="password" name="password_confirm" class="form-control" placeholder="Nhập lại mật khẩu" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-person-plus me-1"></i>Tạo tài khoản
          </button>
        </form>
      </div>
    </div>
    <p class="text-center text-muted mt-3 small">
      Đã có tài khoản? <a href="/login">Đăng nhập</a>
    </p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
