<!DOCTYPE html>
<html lang="{{ get_lang() }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ _("auth_register_title") }} — AutoBlogspot</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
  <style>
    body { background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; }
    .auth-card { max-width: 460px; width: 100%; margin: auto; }
    .auth-brand { font-size: 1.5rem; font-weight: 700; color: #4f46e5; }
  </style>
</head>
<body>
  <div class="auth-card px-3">
    <div class="text-center mb-4">
      <div class="auth-brand"><img src="/static/img/favicon.svg" height="32" class="me-2" style="vertical-align:middle">AutoBlogspot</div>
      <p class="text-muted mt-1">{{ _("auth_register_subtitle") }}</p>
    </div>
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        {% if error %}
        <div class="alert alert-danger py-2">
          <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
        </div>
        {% endif %}
        <form method="post" action="/register">
          <div class="mb-3">
            <label class="form-label fw-semibold">{{ _("auth_full_name") }}</label>
            <input type="text" name="full_name" class="form-control" placeholder="Nguyễn Văn A"
              value="{{ full_name or '' }}" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">{{ _("auth_email") }}</label>
            <input type="email" name="email" class="form-control" placeholder="you@example.com"
              value="{{ email or '' }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">{{ _("auth_password") }}</label>
            <input type="password" name="password" class="form-control" placeholder="{{ _('auth_pw_placeholder') }}" required>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">{{ _("auth_confirm_password") }}</label>
            <input type="password" name="password_confirm" class="form-control" placeholder="{{ _('auth_pw_confirm_placeholder') }}" required>
          </div>
          <p class="text-muted small mb-3">
            {{ _("auth_register_agree") }}
            <a href="/terms" target="_blank">{{ _("land_footer_terms") }}</a>
            {{ _("auth_register_agree_and") }}
            <a href="/privacy" target="_blank">{{ _("land_footer_privacy") }}</a>.
          </p>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-person-plus me-1"></i>{{ _("auth_btn_register") }}
          </button>
        </form>
      </div>
    </div>
    <p class="text-center text-muted mt-3 small">
      {{ _("auth_have_account") }} <a href="/login">{{ _("auth_login_link") }}</a>
    </p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
