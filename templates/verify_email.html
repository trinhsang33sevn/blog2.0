<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xác minh email — AutoBlogspot</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root { --dark:#0d1117; --dark2:#161b22; --dark3:#21262d; --accent:#58a6ff; }
    body { background:var(--dark); color:#e6edf3; font-family:'Segoe UI',system-ui,sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
    .card { background:var(--dark2); border:1px solid #30363d; border-radius:16px; padding:40px 36px; max-width:440px; width:100%; }
    .brand { display:flex; align-items:center; gap:10px; justify-content:center; margin-bottom:28px; text-decoration:none; }
    .brand-icon { width:36px; height:36px; background:linear-gradient(135deg,#EA4335,#1877F2); border-radius:9px; display:flex; align-items:center; justify-content:center; }
    .otp-inputs { display:flex; gap:10px; justify-content:center; margin:28px 0; }
    .otp-inputs input {
      width:50px; height:60px; text-align:center; font-size:1.6rem; font-weight:700;
      background:var(--dark3); border:2px solid #30363d; border-radius:10px; color:#e6edf3;
      transition:border-color .15s;
    }
    .otp-inputs input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(88,166,255,.15); }
    .otp-inputs input.filled { border-color:#4f46e5; }
    .btn-verify { background:linear-gradient(135deg,#4f46e5,#7c3aed); border:none; color:#fff; border-radius:8px; padding:13px; font-size:1rem; font-weight:700; width:100%; transition:opacity .2s; }
    .btn-verify:hover { opacity:.88; }
    .btn-verify:disabled { opacity:.5; cursor:not-allowed; }
    .email-badge { background:var(--dark3); border:1px solid #30363d; border-radius:8px; padding:8px 14px; font-size:.875rem; color:#8b949e; word-break:break-all; }
    .resend-row { text-align:center; margin-top:20px; font-size:.875rem; color:#8b949e; }
    #resendBtn { background:none; border:none; color:var(--accent); cursor:pointer; font-size:.875rem; padding:0; }
    #resendBtn:disabled { color:#8b949e; cursor:not-allowed; }
    .alert-err { background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.3); color:#f87171; border-radius:8px; padding:12px 16px; margin-bottom:20px; font-size:.875rem; }
    .alert-ok  { background:rgba(16,185,129,.1); border:1px solid rgba(16,185,129,.3); color:#34d399; border-radius:8px; padding:12px 16px; margin-bottom:20px; font-size:.875rem; }
    .timer { font-size:.8rem; }
  </style>
</head>
<body>
<div class="card">
  <a href="/" class="brand">
    <div class="brand-icon"><i class="bi bi-send-fill text-white" style="font-size:.9rem;"></i></div>
    <span style="font-size:1.2rem;font-weight:800;color:#e6edf3;">AutoBlogspot</span>
  </a>

  <div style="text-align:center;margin-bottom:20px;">
    <div style="width:60px;height:60px;background:rgba(79,70,229,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
      <i class="bi bi-envelope-check-fill" style="font-size:1.6rem;color:#818cf8;"></i>
    </div>
    <h5 style="font-weight:800;color:#e6edf3;margin-bottom:6px;">Xác minh email của bạn</h5>
    <p style="color:#8b949e;font-size:.9rem;margin:0;">Chúng tôi đã gửi mã 6 số đến</p>
    <div class="email-badge mt-2">{{ email }}</div>
  </div>

  {% if error %}
  <div class="alert-err"><i class="bi bi-exclamation-circle me-2"></i>{{ error }}</div>
  {% endif %}

  {% if request.query_params.get('resent') %}
  <div class="alert-ok"><i class="bi bi-check-circle me-2"></i>Đã gửi lại mã mới. Kiểm tra hộp thư của bạn.</div>
  {% endif %}

  <form method="post" action="/verify-email" id="otpForm">
    <input type="hidden" name="email" value="{{ email }}">
    <input type="hidden" name="otp" id="otpHidden">

    <div class="otp-inputs" id="otpBoxes">
      <input type="text" inputmode="numeric" maxlength="1" data-idx="0" autofocus>
      <input type="text" inputmode="numeric" maxlength="1" data-idx="1">
      <input type="text" inputmode="numeric" maxlength="1" data-idx="2">
      <input type="text" inputmode="numeric" maxlength="1" data-idx="3">
      <input type="text" inputmode="numeric" maxlength="1" data-idx="4">
      <input type="text" inputmode="numeric" maxlength="1" data-idx="5">
    </div>

    <button type="submit" class="btn-verify" id="submitBtn" disabled>
      <i class="bi bi-shield-check me-2"></i>Xác minh
    </button>
  </form>

  <div class="resend-row">
    <span id="resendMsg">Gửi lại mã sau <span id="countdown" class="timer">60</span>s</span>
    <span id="resendReady" style="display:none;">
      Không nhận được mã?
      <form method="post" action="/verify-email/resend" style="display:inline">
        <input type="hidden" name="email" value="{{ email }}">
        <button type="submit" id="resendBtn">Gửi lại</button>
      </form>
    </span>
  </div>

  <div style="text-align:center;margin-top:24px;font-size:.8rem;color:#6e7681;">
    <a href="/register" style="color:#8b949e;text-decoration:none;"><i class="bi bi-arrow-left me-1"></i>Quay lại đăng ký</a>
  </div>
</div>

<script>
const boxes = Array.from(document.querySelectorAll('#otpBoxes input'));
const submitBtn = document.getElementById('submitBtn');
const otpHidden = document.getElementById('otpHidden');

function updateSubmit() {
  const val = boxes.map(b => b.value).join('');
  otpHidden.value = val;
  submitBtn.disabled = val.length < 6;
  boxes.forEach(b => b.classList.toggle('filled', b.value !== ''));
}

boxes.forEach((box, i) => {
  box.addEventListener('input', e => {
    // Allow only digits
    box.value = box.value.replace(/\D/g, '').slice(-1);
    if (box.value && i < 5) boxes[i + 1].focus();
    updateSubmit();
  });
  box.addEventListener('keydown', e => {
    if (e.key === 'Backspace' && !box.value && i > 0) {
      boxes[i - 1].focus();
      boxes[i - 1].value = '';
      updateSubmit();
    }
    if (e.key === 'ArrowLeft' && i > 0) boxes[i - 1].focus();
    if (e.key === 'ArrowRight' && i < 5) boxes[i + 1].focus();
  });
  box.addEventListener('paste', e => {
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
    text.split('').slice(0, 6).forEach((ch, j) => {
      if (boxes[j]) boxes[j].value = ch;
    });
    const next = Math.min(text.length, 5);
    boxes[next].focus();
    updateSubmit();
  });
});

// Countdown to show resend button
let secs = 60;
const countdownEl = document.getElementById('countdown');
const resendMsg = document.getElementById('resendMsg');
const resendReady = document.getElementById('resendReady');
const timer = setInterval(() => {
  secs--;
  if (countdownEl) countdownEl.textContent = secs;
  if (secs <= 0) {
    clearInterval(timer);
    resendMsg.style.display = 'none';
    resendReady.style.display = '';
  }
}, 1000);

// Submit on enter when all filled
document.getElementById('otpForm').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !submitBtn.disabled) submitBtn.click();
});
</script>
</body>
</html>
