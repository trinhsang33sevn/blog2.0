<!DOCTYPE html>
<html lang="{{ get_lang() }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ _("auth_login_title") }} — AutoBlogspot</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
  <style>
    body { background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; }
    .auth-card { max-width: 420px; width: 100%; margin: auto; }
    .auth-brand { font-size: 1.5rem; font-weight: 700; color: #4f46e5; }
  </style>
</head>
<body>
  <div class="auth-card px-3">
    <div class="text-center mb-4">
      <div class="auth-brand"><img src="/static/img/favicon.svg" height="32" class="me-2" style="vertical-align:middle">AutoBlogspot</div>
      <p class="text-muted mt-1">{{ _("auth_login_subtitle") }}</p>
    </div>
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        {% if error %}
        <div class="alert alert-danger py-2">
          <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
        </div>
        {% endif %}
        <form method="post" action="/login">
          <div class="mb-3">
            <label class="form-label fw-semibold">{{ _("auth_email") }}</label>
            <input type="email" name="email" class="form-control" placeholder="you@example.com" required autofocus>
          </div>
          <div class="mb-4">
            <div class="d-flex justify-content-between align-items-center">
              <label class="form-label fw-semibold mb-0">{{ _("auth_password") }}</label>
              <a href="/forgot-password" class="small text-muted">{{ _("fp_forgot_link") }}</a>
            </div>
            <input type="password" name="password" class="form-control mt-1" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-box-arrow-in-right me-1"></i>{{ _("auth_btn_login") }}
          </button>
        </form>
      </div>
    </div>
    <p class="text-center text-muted mt-3 small">
      {{ _("auth_no_account") }} <a href="/register">{{ _("auth_signup_now") }}</a>
    </p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
