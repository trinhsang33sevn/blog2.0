<!DOCTYPE html>
<html lang="{{ get_lang() }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ _("fp_title") }} — AutoBlogspot</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
  <style>
    body { background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; }
    .auth-card { max-width: 420px; width: 100%; margin: auto; }
    .auth-brand { font-size: 1.5rem; font-weight: 700; color: #4f46e5; }
  </style>
</head>
<body>
  <div class="auth-card px-3">
    <div class="text-center mb-4">
      <div class="auth-brand">
        <img src="/static/img/favicon.svg" height="32" class="me-2" style="vertical-align:middle">AutoBlogspot
      </div>
      <p class="text-muted mt-1">{{ _("fp_subtitle") }}</p>
    </div>
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        {% if success %}
          <div class="text-center py-2">
            <div class="mb-3" style="font-size:3rem">📧</div>
            <h5 class="fw-bold">{{ _("fp_email_sent_title") }}</h5>
            <p class="text-muted small">{{ _("fp_email_sent_desc") }}</p>
            <a href="/login" class="btn btn-primary mt-2 w-100">
              <i class="bi bi-box-arrow-in-right me-1"></i>{{ _("auth_btn_login") }}
            </a>
          </div>
        {% else %}
          <p class="text-muted small mb-3">{{ _("fp_desc") }}</p>
          <form method="post" action="/forgot-password">
            <div class="mb-3">
              <label class="form-label fw-semibold">{{ _("auth_email") }}</label>
              <input type="email" name="email" class="form-control" placeholder="you@example.com" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary w-100">
              <i class="bi bi-send me-1"></i>{{ _("fp_btn_send") }}
            </button>
          </form>
        {% endif %}
      </div>
    </div>
    <p class="text-center text-muted mt-3 small">
      {{ _("auth_have_account") }} <a href="/login">{{ _("auth_login_link") }}</a>
    </p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
